name: Build Dev Containers

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/antwika-dev

jobs:
  build-base:
    name: Build base dev container
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer/base
          file: .devcontainer/base/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-base:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-base:latest

  build-llvm:
    name: Build LLVM devcontainer
    needs: build-base
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-base.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push LLVM image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer/llvm
          file: .devcontainer/llvm/Dockerfile
          push: true
          build-args: |
            BASE_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-llvm:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-llvm:latest

  build-gnu:
    name: Build GNU devcontainer
    needs: build-base
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-base.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push GNU image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer/gnu
          file: .devcontainer/gnu/Dockerfile
          push: true
          build-args: |
            BASE_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gnu:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-gnu:latest

  build-mingw:
    name: Build MinGW devcontainer
    needs: build-base
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-base.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push MinGW image
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer/mingw
          file: .devcontainer/mingw/Dockerfile
          push: true
          build-args: |
            BASE_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mingw:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mingw:latest
